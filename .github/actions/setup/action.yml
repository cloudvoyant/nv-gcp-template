name: "Setup Environment"
description: "Install mise, tools, and configure environment"

runs:
  using: "composite"
  steps:
    - name: Install mise
      uses: jdx/mise-action@v2
      with:
        install: true
        cache: true

    - name: Verify tool installation
      shell: bash
      run: |
        node --version
        pnpm --version
        terraform --version
