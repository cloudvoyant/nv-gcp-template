name: "Setup GCP"
description: "Authenticate and configure GCP"

inputs:
  gcp_sa_key:
    description: "GCP Service Account Key"
    required: true

runs:
  using: "composite"
  steps:
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ inputs.gcp_sa_key }}

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Set GCP project
      shell: bash
      run: |
        # Load mise env vars into the shell and export to GITHUB_ENV
        eval "$(mise env --shell bash)"
        gcloud config set project "${GCP_DEVOPS_PROJECT_ID}"
        echo "Active project: $(gcloud config get-value project)"
        # Export all GCP vars to subsequent steps
        echo "GCP_DEVOPS_PROJECT_ID=${GCP_DEVOPS_PROJECT_ID}" >> $GITHUB_ENV
        echo "GCP_PROJECT_ID=${GCP_PROJECT_ID}" >> $GITHUB_ENV
        echo "GCP_REGION=${GCP_REGION}" >> $GITHUB_ENV
        echo "PROJECT=${PROJECT}" >> $GITHUB_ENV
